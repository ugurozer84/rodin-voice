<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rodin Voice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif;color:#fff}
body{display:flex;flex-direction:column;align-items:center}

.avatar-area{position:relative;width:220px;height:220px;margin-top:60px;display:flex;align-items:center;justify-content:center}
.ring{position:absolute;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%)}
.r1{width:160px;height:160px;border:1.5px solid rgba(201,169,110,.2);animation:p1 3s ease-in-out infinite}
.r2{width:190px;height:190px;border:1.5px solid rgba(201,169,110,.15);animation:p2 3s ease-in-out .5s infinite}
.r3{width:220px;height:220px;border:1px solid rgba(201,169,110,.1);animation:p3 3s ease-in-out 1s infinite}
.r4{width:250px;height:250px;border:1px solid rgba(201,169,110,.06);animation:p4 4s ease-in-out 1.5s infinite}
@keyframes p1{0%,100%{transform:translate(-50%,-50%) scale(1);border-color:rgba(201,169,110,.2)}50%{transform:translate(-50%,-50%) scale(1.04);border-color:rgba(201,169,110,.45)}}
@keyframes p2{0%,100%{transform:translate(-50%,-50%) scale(1);border-color:rgba(201,169,110,.15)}50%{transform:translate(-50%,-50%) scale(1.06);border-color:rgba(201,169,110,.35)}}
@keyframes p3{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.05);border-color:rgba(201,169,110,.25)}}
@keyframes p4{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.03)}}

.avatar{width:130px;height:130px;border-radius:50%;border:2px solid #C9A96E;background:#111;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 0 25px rgba(201,169,110,.25)}
.avatar .i{font-family:Georgia,serif;font-size:38px;color:#C9A96E;font-weight:bold}
.avatar .n{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}

.orbit{position:absolute;width:240px;height:240px;left:50%;top:50%;transform:translate(-50%,-50%);animation:spin 15s linear infinite}
.dot{position:absolute;width:5px;height:5px;border-radius:50%;background:#C9A96E;animation:dp 2s ease-in-out infinite}
.d1{top:0;left:48%;opacity:.5}.d2{top:48%;right:0;opacity:.3;animation-delay:.4s}.d3{bottom:0;left:48%;opacity:.5;animation-delay:.8s}
.d4{top:48%;left:0;opacity:.3;animation-delay:1.2s}.d5{top:16%;right:10%;opacity:.4;animation-delay:1.6s}.d6{bottom:16%;left:10%;opacity:.4;animation-delay:2s}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes dp{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:.8;transform:scale(1.5);box-shadow:0 0 6px rgba(201,169,110,.6)}}

.hint{margin-top:24px;font-size:14px;color:rgba(201,169,110,.7);text-align:center;letter-spacing:.5px}
.sub{margin-top:8px;font-size:11px;color:rgba(255,255,255,.25);text-align:center}

/* Position the ElevenLabs widget orb at bottom center */
elevenlabs-convai{
  position:fixed!important;
  bottom:30px!important;
  left:50%!important;
  transform:translateX(-50%)!important;
  z-index:9999!important;
}

.close-btn{
  position:fixed;bottom:100px;
  background:rgba(229,57,53,.12);border:1px solid rgba(229,57,53,.35);
  border-radius:24px;padding:10px 24px;color:#e53935;font-size:13px;cursor:pointer;
  z-index:9998;
}
</style>
</head>
<body>
<div class="avatar-area">
  <div class="ring r1"></div><div class="ring r2"></div><div class="ring r3"></div><div class="ring r4"></div>
  <div class="orbit"><div class="dot d1"></div><div class="dot d2"></div><div class="dot d3"></div><div class="dot d4"></div><div class="dot d5"></div><div class="dot d6"></div></div>
  <div class="avatar"><div style="text-align:center"><div class="i">AR</div><div class="n">Auguste Rodin</div></div></div>
</div>
<div class="hint">Aşağıdaki butona dokunarak<br>Rodin ile konuşun</div>
<div class="sub">Powered by ElevenLabs AI</div>

<button class="close-btn" onclick="if(window.ReactNativeWebView)window.ReactNativeWebView.postMessage(JSON.stringify({type:'ended'}))">⏹ Kapat</button>

<elevenlabs-convai agent-id="agent_4101kpgykvq0ea0a97kj794pqwmq"></elevenlabs-convai>
<script src="https://unpkg.com/@elevenlabs/convai-widget-embed" async type="text/javascript"></script>
</body>
</html>
