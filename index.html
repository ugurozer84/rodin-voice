<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Rodin Voice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,sans-serif;color:#fff}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}
.avatar-area{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center}
.ring{position:absolute;border-radius:50%;left:50%;top:50%;transform:translate(-50%,-50%);transition:all .3s ease}
.r1{width:160px;height:160px;border:1.5px solid rgba(201,169,110,.2)}
.r2{width:190px;height:190px;border:1.5px solid rgba(201,169,110,.15)}
.r3{width:220px;height:220px;border:1px solid rgba(201,169,110,.1)}
.r4{width:250px;height:250px;border:1px solid rgba(201,169,110,.06)}
.ring.active{border-color:rgba(201,169,110,.5);box-shadow:0 0 15px rgba(201,169,110,.15)}
.avatar{width:130px;height:130px;border-radius:50%;border:2px solid #C9A96E;background:#111;display:flex;align-items:center;justify-content:center;z-index:10;box-shadow:0 0 25px rgba(201,169,110,.25)}
.avatar .i{font-family:Georgia,serif;font-size:38px;color:#C9A96E;font-weight:bold}
.avatar .n{font-size:10px;color:rgba(255,255,255,.4);margin-top:2px}
.orbit{position:absolute;width:240px;height:240px;left:50%;top:50%;transform:translate(-50%,-50%);animation:spin 15s linear infinite}
.dot{position:absolute;width:5px;height:5px;border-radius:50%;background:#C9A96E;opacity:.2;transition:all .2s}
.dot.active{opacity:.8;width:7px;height:7px;box-shadow:0 0 8px rgba(201,169,110,.7)}
.d1{top:0;left:48%}.d2{top:48%;right:0}.d3{bottom:0;left:48%}.d4{top:48%;left:0}.d5{top:16%;right:10%}.d6{bottom:16%;left:10%}
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
.status{margin-top:20px;font-size:13px;color:rgba(201,169,110,.7);letter-spacing:1.5px}
.btn{margin-top:24px;background:#C9A96E;border:none;border-radius:30px;padding:14px 32px;font-size:16px;color:#000;font-weight:600;cursor:pointer;font-family:Georgia,serif;letter-spacing:1px}
.btn.stop{background:rgba(229,57,53,.12);border:1px solid rgba(229,57,53,.4);color:#e53935}
.btn:disabled{opacity:.5}
.err{color:#e53935;font-size:12px;margin-top:10px;text-align:center;padding:0 20px}
</style>
</head>
<body>
<div class="avatar-area">
  <div class="ring r1" id="r1"></div>
  <div class="ring r2" id="r2"></div>
  <div class="ring r3" id="r3"></div>
  <div class="ring r4" id="r4"></div>
  <div class="orbit"><div class="dot d1" id="d1"></div><div class="dot d2" id="d2"></div><div class="dot d3" id="d3"></div><div class="dot d4" id="d4"></div><div class="dot d5" id="d5"></div><div class="dot d6" id="d6"></div></div>
  <div class="avatar"><div style="text-align:center"><div class="i">AR</div><div class="n">Auguste Rodin</div></div></div>
</div>
<div class="status" id="st">Konuşmayı başlatın</div>
<div class="err" id="err"></div>
<button class="btn" id="btn" onclick="toggle()">🎙 Konuşmayı Başlat</button>

<script type="module">
import{Conversation}from"https://cdn.jsdelivr.net/npm/@elevenlabs/client@1.56.2/+esm";
let conv=null,volInt=null;
const rings=[document.getElementById('r1'),document.getElementById('r2'),document.getElementById('r3'),document.getElementById('r4')];
const dots=[document.getElementById('d1'),document.getElementById('d2'),document.getElementById('d3'),document.getElementById('d4'),document.getElementById('d5'),document.getElementById('d6')];
const st=document.getElementById('st'),btn=document.getElementById('btn'),err=document.getElementById('err');
const agentId=new URLSearchParams(location.search).get('agent')||'agent_4101kpgykvq0ea0a97kj794pqwmq';

function setAct(l){
  rings.forEach((r,i)=>{if(l>0.04*(i+1)){r.classList.add('active');r.style.transform=`translate(-50%,-50%) scale(${1+l*0.06*(i+1)})`}else{r.classList.remove('active');r.style.transform='translate(-50%,-50%) scale(1)'}});
  dots.forEach((d,i)=>{if(i<Math.round(l*10))d.classList.add('active');else d.classList.remove('active')});
}

window.toggle=async function(){
  if(conv){
    clearInterval(volInt);await conv.endSession();conv=null;
    btn.textContent='🎙 Konuşmayı Başlat';btn.className='btn';st.textContent='Konuşma bitti';setAct(0);
    if(window.ReactNativeWebView)window.ReactNativeWebView.postMessage(JSON.stringify({type:'ended'}));
    return;
  }
  try{
    err.textContent='';btn.disabled=true;st.textContent='Bağlanıyor...';
    await navigator.mediaDevices.getUserMedia({audio:true});
    conv=await Conversation.startSession({
      agentId,
      onConnect:()=>{st.textContent='Dinliyor...';btn.disabled=false;btn.textContent='⏹ Kapat';btn.className='btn stop';
        if(window.ReactNativeWebView)window.ReactNativeWebView.postMessage(JSON.stringify({type:'connected'}));},
      onDisconnect:()=>{st.textContent='Bağlantı kesildi';btn.textContent='🎙 Konuşmayı Başlat';btn.className='btn';btn.disabled=false;conv=null;setAct(0)},
      onError:(e)=>{err.textContent='Hata: '+(e||'bilinmiyor')},
      onModeChange:(m)=>{st.textContent=m.mode==='speaking'?'Rodin konuşuyor...':'Dinliyor...'},
    });
    volInt=setInterval(async()=>{if(!conv)return;try{const i=await conv.getInputVolume();const o=await conv.getOutputVolume();setAct(Math.max(i||0,o||0))}catch(e){}},100);
  }catch(e){err.textContent='Hata: '+(e.message||e);btn.disabled=false;st.textContent='Başlatılamadı';}
};
</script>
</body>
</html>
